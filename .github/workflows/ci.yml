name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 \
            python3-pytest \
            python3-httpx \
            python3-pyqt6 \
            python3-dbus \
            python3-gi \
            ripgrep

      - name: Run public prepublish gate
        run: bash scripts/prepublish_check.sh --ci
